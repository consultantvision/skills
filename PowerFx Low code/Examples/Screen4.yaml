                        PaddingRight: =10.05
                        PaddingTop: =10.05
                        Size: =16
                        Text: ="Item for " & varglbTitle
                        Width: =835.20
                        X: =0.00
            - FooterContainer1_1:
                Control: GroupContainer@1.3.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(185, 133, 230, 1)
                  FillPortions: =0
                  Height: =40
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutJustifyContent: =LayoutJustifyContent.Center
                  PaddingLeft: =20
                  PaddingRight: =0.00
                  PaddingTop: =0.00
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                  Visible: =varGridEdit
                  Width: =835.20
                  X: =12.80
                Children:
                  - btnSave:
                      Control: Button@0.0.45
                      Properties:
                        OnSelect: |-
                          =// Save NEW records to SharePoint
                          ForAll(
                              Filter(
                                  colGridData,
                                  isNew = true
                              ) As Items,
                              Patch(
                                  hsa_purchasequotes,
                                  Defaults(hsa_purchasequotes),
                                  {
                                      Product: Items.Product,
                                      Productcode: Items.Itemdescription,
                                      WebLink: Items.WebLink,
                                      Model: Items.Model,
                                      Size: Items.Size,
                                      Quantity: Items.Quantity,
                                      GUID: Items.GUID,
                                      ParentID: {
                                          Value: varglbTitle,
                                          Id: Value(varglbID)
                                      }
                                  }
                              )
                          );
                          // Update EXISTING records that were edited
                          ForAll(
                              Filter(
                                  colGridData,
                                  !isNew && isEdit
                              ) As Items,
                              Patch(
                                  hsa_purchasequotes,
                                  LookUp(
                                      hsa_purchasequotes,
                                      GUID = Items.GUID
                                  ),
                                  {
                                      Product: Items.Product,
                                      Productcode: Items.Itemdescription,
                                      WebLink: Items.WebLink,
                                      Model: Items.Model,
                                      Size: Items.Size,
                                      Quantity: Items.Quantity
                                  }
                              )
                          );
                          // Mark all records as saved and not in edit mode
                          ForAll(
                              colGridData,
                              Patch(
                                  colGridData,
                                  LookUp(
                                      colGridData,
                                      GUID = ThisRecord.GUID
                                  ),
                                  {
                                      isNew: false,
                                      isEdit: false,
                                      isFirstSave: false
                                  }
                              )
                          );
                          Notify(
                              "All records saved successfully",
                              NotificationType.Success
                          )
                        Text: ="Save"
                        Visible: =false
                        Width: =60.28
                        X: =395.20
                  - btnAddLineItem:
                      Control: Button@0.0.45
                      Properties:
                        Align: =Align.Center
                        DisplayMode: =//If(CountRows(colGridUpdates)=0,DisplayMode.Edit,DisplayMode.Disabled)
                        Icon: ="Add"
                        Layout: ='ButtonCanvas.Layout'.IconAfter
                        OnSelect: |-
                          =Collect(
                              colGridData,
                              {
                                  Itemdescription: Blank(),
                                  Quantity: Blank(),
                                  Size: Blank(),
                                  Model: Blank(),
                                  Product: Blank(),
                                  WebLink: Blank(),
                                  ParentID: {
                                      Value: varglbTitle,
                                      Id: Value(varglbID)
                                  },
                                  GUID: GUID(),
                                  isNew: true,
                                  isEdit: true,
                                  isFirstSave: true
                              }
                          );
                          If(
                              TaskItemsgal.AllItemsCount > 0,
                              UpdateContext({varDoNotSubmit: true}),
                              UpdateContext({varDoNotSubmit: false})
                          )
                        Text: ="Add New Line Item"
                        Visible: |+
                          =varGridEdit

                        Width: =180
                        X: =464
                  - btnLoadGrid_1:
                      Control: Button@0.0.45
                      Properties:
                        OnSelect: |-
                          =ClearCollect(
                              colGridData,
                              Filter(
                                  hsa_purchasequotes,
                                  ParentID.Value = varglbTitle //And ParentID.Id = frmPurchaserqst3.LastSubmit.ID)
                              )
                          );
                          /*
                          Clear(colGridUpdates);
                          Set(
                              varReset,
                              false
                          );
                          Set(
                              varReset,
                              true
                          );
                          */
                        Visible: =false
                        Width: =60.28
                        X: =0.00
