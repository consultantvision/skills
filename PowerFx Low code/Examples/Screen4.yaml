                              Appearance: ='TextInputCanvas.Appearance'.Outline
                              BasePaletteColor: =RGBA(168, 110, 235, 1)
                              DisplayMode: =If(ThisItem.isEdit, DisplayMode.Edit, DisplayMode.View)
                              Fill: =RGBA(201, 220, 242, 1)
                              Height: =36
                              OnChange: =Select(btnUpdate_1)
                              Value: =ThisItem.Productcode
                              Width: =342
                              X: =218
                        - txtProduct:
                            Control: TextInput@0.0.54
                            Properties:
                              Appearance: ='TextInputCanvas.Appearance'.Outline
                              BasePaletteColor: =RGBA(168, 110, 235, 1)
                              DisplayMode: =If(ThisItem.isEdit, DisplayMode.Edit, DisplayMode.View)
                              Fill: =RGBA(201, 220, 242, 1)
                              Height: =36
                              OnChange: =Select(btnUpdate_1)
                              Value: =ThisItem.Product
                              Width: =199
                              X: =3
                        - icnEdit:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              Height: =30
                              Icon: =Icon.Edit
                              OnSelect: |-
                                =Patch(
                                    colGridData,
                                    LookUp(
                                        colGridData,
                                        GUID = ThisItem.GUID
                                    ),
                                    {isEdit: true}
                                )
                              PaddingBottom: =5
                              PaddingLeft: =5
                              PaddingRight: =5
                              PaddingTop: =5
                              Tooltip: ="Edit current line item"
                              Visible: =!ThisItem.isEdit And varGridEdit
                              Width: =30
                              X: =1240
                              Y: =5
                        - icnSave:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              DisabledColor: =RGBA(224, 86, 6, 1)
                              DisplayMode: |-
                                =//If((IsBlank(txtProduct.Value)||IsBlank(txtProductcode.Value)||IsBlank(txtSize.Value)||IsBlank(txtWeblink.Value)||IsBlank(numQuantity.Value)),DisplayMode.Disabled,DisplayMode.Edit)
                                If(fmIsRecordBlank,DisplayMode.View,DisplayMode.Edit)
                              Height: =30
                              Icon: =Icon.Save
                              OnSelect: |-
                                =// Save or update this specific row
                                If(
                                    ThisItem.isNew,
                                    // Create new record
                                    Patch(
                                        hsa_purchasequotes,
                                        Defaults(hsa_purchasequotes),
                                        {
                                            Product: txtProduct.Value,
                                            Productcode: txtProductcode.Value,
                                            WebLink: txtWeblink.Value,
                                            Size: txtSize.Value,
                                            Quantity: Value(numQuantity.Value),
                                            GUID: ThisItem.GUID,
                                            ParentID: {
                                                Value: PurchaseTitle.Value,
                                                Id: Value(dtID.Value)
                                            }
                                        }
                                    ),
                                    // Update existing record
                                    Patch(
                                        hsa_purchasequotes,
                                        LookUp(
                                            hsa_purchasequotes,
                                            GUID = ThisItem.GUID
                                        ),
                                        {
                                            Productcode: txtProductcode.Value,
                                            Product: txtProduct.Value,
                                            WebLink: txtWeblink.Value,
                                            Quantity: Value(numQuantity.Value),
                                            Size: txtSize.Value,
                                            ParentID: {
                                                Value: PurchaseTitle.Value,
                                                Id: Value(dtID.Value)
                                            }
                                        }
                                    )
                                );
                                // Update collection
                                Patch(
                                    colGridData,
                                    LookUp(
                                        colGridData,
                                        GUID = ThisItem.GUID
                                    ),
                                    {
                                        Productcode: txtProductcode.Value,
                                        Product: txtProduct.Value,
                                        WebLink: txtWeblink.Value,
                                        Quantity: Value(numQuantity.Value),
                                        Size: txtSize.Value,
                                        isNew: false,
                                        isEdit: false
                                    }
                                );

                                UpdateContext(
                                    {varDoNotSubmit: true};
                                    {IsGridRecord: CountRows(colGridData)}
                                );
                                Notify(
                                    "Record item saved ✔️",
                                    NotificationType.Success,
                                    900
                                )
                              PaddingBottom: =5
                              PaddingLeft: =5
                              PaddingRight: =5
                              PaddingTop: =5
                              Tooltip: ="Save current Item"
                              Visible: =ThisItem.isEdit
                              Width: =30
                              X: =1240
                              Y: =5
                        - icnCancel:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              DisabledBorderColor: =RGBA(9, 33, 98, 1)
                              DisabledColor: =RGBA(255, 0, 0, 1)
                              DisplayMode: |-
                                =If(
                                    IsBlank(ThisItem.Product),
                                    DisplayMode.Edit,
                                    DisplayMode.Disabled
                                )
                              Height: =30
                              Icon: =Icon.Cancel
                              OnSelect: |-
                                =// If it's a NEW record that was never saved, remove it from collection
                                If(
                                    ThisItem.isNew && ThisItem.isFirstSave,
                                    Remove(
                                        colGridData,
                                        ThisItem
                                    ),
                                    // If it's an existing record being edited, revert changes
                                    If(
                                        !ThisItem.isNew,
                                        Patch(
                                            colGridData,
                                            LookUp(
                                                colGridData,
                                                GUID = ThisItem.GUID
                                            ),
                                            LookUp(
                                                hsa_purchasequotes,
                                                GUID = ThisItem.GUID
                                            )
                                        )
                                    );
                                    // Turn off edit mode
                                Patch(
                                        colGridData,
                                        LookUp(
                                            colGridData,
                                            GUID = ThisItem.GUID
                                        ),
                                        {isEdit: false}
                                    )
                                );
                                Notify(
                                    "Cancelled",
                                    NotificationType.Warning,
                                    800
                                )
                              PaddingBottom: =5
                              PaddingLeft: =5
                              PaddingRight: =5
                              PaddingTop: =5
                              Tooltip: ="Reset Line item"
                              Visible: =varGridEdit
                              Width: =30
                              X: =1270
                              Y: =5
                        - icnDel:
                            Control: Classic/Icon@2.5.0
                            Properties:
                              DisabledColor: =RGBA(255, 0, 0, 1)
                              DisplayMode: |-
                                =//icnSave.DisplayMode
                                If(
                                    IsBlank(ThisItem.Product),
                                    DisplayMode.Disabled,
                                    DisplayMode.Edit
                                )
                              Height: =30
                              Icon: =Icon.Trash
                              OnSelect: |-
                                =// Delete from SharePoint if already saved
                                If(
                                    !ThisItem.isNew,
                                    Remove(
                                        hsa_purchasequotes,
                                        LookUp(
                                            hsa_purchasequotes,
                                            GUID = ThisItem.GUID
                                        )
                                    )
                                );
                                // Remove from collection
                                Remove(
                                    colGridData,
                                    ThisItem
                                );
                                UpdateContext({varDoNotSubmit: true});
                                Notify(
                                    "Record deleted",
                                    NotificationType.Success,
                                    1000
                                )
                              PaddingBottom: =5
                              PaddingLeft: =5
                              PaddingRight: =5
                              PaddingTop: =5
                              Tooltip: ="Delete the current item"
                              Visible: =varGridEdit
                              Width: =30
                              X: =1300
                              Y: =5
                        - btnUpdate_1:
                            Control: Button@0.0.45
                            Properties:
                              OnSelect: "=/*If(\n    IsBlank(\n        LookUp(\n            colGridUpdates,\n            ID = ThisItem.ID\n        )\n    ),\n    Collect(\n        colGridUpdates,\n        ThisItem\n    )\n);\nUpdateIf(\n    colGridUpdates,\n    ID = ThisItem.ID,\n    {\n        \n        Quantity: Value(numQuantity.Value),\n        Size: Value(txtSize.Value),\n        Product: txtProduct.Value,\n        Model: txtModel.Value,\n        WebLink: txtWeblink.Value\n    }\n)*/"
                              Visible: =false
                              Width: =20
                              X: =3
                  - FooterContainer1_2:
                      Control: GroupContainer@1.3.0
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =0
                        Height: =40
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Horizontal
