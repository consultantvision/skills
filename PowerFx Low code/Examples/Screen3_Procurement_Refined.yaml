Screens:
  Screen3_Procurement:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
    Children:
      - MainContainer_S3:
          Control: GroupContainer@1.4.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =20
            PaddingBottom: =20
            PaddingLeft: =20
            PaddingRight: =20
            PaddingTop: =20
            Width: =Parent.Width
          Children:
            - Dashboard_S3:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =140
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =10
                  LayoutMaxHeight: =200
                  LayoutMinHeight: =100
                  PaddingBottom: =10
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =10
                Children:
                  - lblTitle_S3:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =RGBA(102, 51, 153, 1)
                        FontWeight: =FontWeight.Bold
                        Size: =20
                        Text: ="New Supplier Onboarding Request"
                  - conProgressHeader_S3:
                      Control: GroupContainer@1.4.0
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =10
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                      Children:
                        - conStepCards_S3:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                              Height: =60
                            Children:
                              - conStep1_Card_S3:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    FillPortions: =1
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =10
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    BorderColor: =RGBA(0, 128, 0, 1)
                                    BorderThickness: =1
                                    PaddingLeft: =10
                                    PaddingRight: =10
                                    Fill: =RGBA(255, 255, 255, 1)
                                  Children:
                                    - icoStep1_Check_S3:
                                        Control: Classic/Icon
                                        Properties:
                                          Icon: =Icon.CheckBadge
                                          Color: =RGBA(0, 128, 0, 1)
                                          Width: =32
                                          Height: =32
                                    - conStep1_Text_S3:
                                        Control: GroupContainer@1.4.0
                                        Variant: AutoLayout
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =0
                                          LayoutJustifyContent: =LayoutJustifyContent.Center
                                        Children:
                                          - lblStep1_Title_S3:
                                              Control: Label@2.5.1
                                              Properties:
                                                Text: ="Service Details"
                                                Color: =RGBA(102, 51, 153, 1)
                                                FontWeight: =FontWeight.Bold
                                                Size: =10
                                          - lblStep1_Status_S3:
                                              Control: Label@2.5.1
                                              Properties:
                                                Text: ="COMPLETED"
                                                Color: =RGBA(0, 128, 0, 1)
                                                Size: =10
                              - conStep2_Card_S3:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    FillPortions: =1
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =10
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    BorderColor: =RGBA(0, 128, 0, 1)
                                    BorderThickness: =1
                                    PaddingLeft: =10
                                    PaddingRight: =10
                                    Fill: =RGBA(255, 255, 255, 1)
                                  Children:
                                    - icoStep2_Check_S3:
                                        Control: Classic/Icon
                                        Properties:
                                          Icon: =Icon.CheckBadge
                                          Color: =RGBA(0, 128, 0, 1)
                                          Width: =32
                                          Height: =32
                                    - conStep2_Text_S3:
                                        Control: GroupContainer@1.4.0
                                        Variant: AutoLayout
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =0
                                          LayoutJustifyContent: =LayoutJustifyContent.Center
                                        Children:
                                          - lblStep2_Title_S3:
                                              Control: Label@2.5.1
                                              Properties:
                                                Text: ="Admin & Supplier"
                                                Color: =RGBA(102, 51, 153, 1)
                                                FontWeight: =FontWeight.Bold
                                                Size: =10
                                          - lblStep2_Status_S3:
                                              Control: Label@2.5.1
                                              Properties:
                                                Text: ="COMPLETED"
                                                Color: =RGBA(0, 128, 0, 1)
                                                Size: =10
                              - conStep3_Card_S3:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    FillPortions: =1
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =10
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    BorderColor: =RGBA(102, 51, 153, 1)
                                    BorderThickness: =2
                                    PaddingLeft: =10
                                    PaddingRight: =10
                                    Fill: =RGBA(255, 255, 255, 1)
                                  Children:
                                    - icoStep3_Check_S3:
                                        Control: Classic/Icon
                                        Properties:
                                          Icon: =Icon.Circle
                                          Color: =RGBA(102, 51, 153, 1)
                                          Width: =32
                                          Height: =32
                                    - conStep3_Text_S3:
                                        Control: GroupContainer@1.4.0
                                        Variant: AutoLayout
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =0
                                          LayoutJustifyContent: =LayoutJustifyContent.Center
                                        Children:
                                          - lblStep3_Title_S3:
                                              Control: Label@2.5.1
                                              Properties:
                                                Text: ="Procurement"
                                                Color: =RGBA(102, 51, 153, 1)
                                                FontWeight: =FontWeight.Bold
                                                Size: =10
                                          - lblStep3_Status_S3:
                                              Control: Label@2.5.1
                                              Properties:
                                                Text: ="IN PROGRESS"
                                                Color: =RGBA(102, 51, 153, 1)
                                                Size: =10
                        - conProgressBar_Wrapper_S3:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              LayoutDirection: =LayoutDirection.Vertical
                              Height: =20
                              Fill: =RGBA(240, 240, 240, 1)
                            Children:
                              - rectProgressBar_S3:
                                  Control: Rectangle
                                  Properties:
                                    Fill: =RGBA(102, 51, 153, 1)
                                    Width: =Parent.Width * 0.90
                                    Height: =Parent.Height
                        - lblProgressPercent_S3:
                            Control: Label@2.5.1
                            Properties:
                              Text: ="90% Completed"
                              Size: =10
                              Color: =RGBA(102, 51, 153, 1)
            - ScrollContent_S3:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =20
                  LayoutOverflowY: =LayoutOverflow.Scroll
                Children:
                  - Header_Procurement_S3:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =RGBA(255, 255, 255, 1)
                        Fill: =RGBA(102, 51, 153, 1)
                        FontWeight: =FontWeight.Bold
                        PaddingLeft: =10
                        Size: =16
                        Text: ="Procurement Considerations"
                  - conProcurement_4:
                      Control: GroupContainer@1.4.0
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =10
                      Children:
                        - conRow_ExistingContract_4:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                              LayoutAlignItems: =LayoutAlignItems.Stretch
                              LayoutMinHeight: =70
                            Children:
                              - lblExistingContract_4:
                                  Control: Label@2.5.1
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    Fill: =RGBA(226, 209, 240, 1)
                                    FontWeight: =FontWeight.Bold
                                    Text: ="Covered under existing contract/MOU? *"
                                    Width: =300
                                    PaddingLeft: =10
                                    VerticalAlign: =VerticalAlign.Middle
                              - radExistingContract_4:
                                  Control: Radio@0.0.25
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Center
                                    Items: =["Yes", "No"]
                                    Layout: =Layout.Horizontal
                                    FillPortions: =1
                        - conRow_QuotationAttached_4:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                              LayoutAlignItems: =LayoutAlignItems.Stretch
                              LayoutMinHeight: =70
                            Children:
                              - lblQuotationAttached_4:
                                  Control: Label@2.5.1
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    Fill: =RGBA(226, 209, 240, 1)
                                    FontWeight: =FontWeight.Bold
                                    Text: ="Quotation/Fee Schedule attached? *"
                                    Width: =300
                                    PaddingLeft: =10
                                    VerticalAlign: =VerticalAlign.Middle
                              - radQuotationAttached_4:
                                  Control: Radio@0.0.25
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Center
                                    Items: =["Yes", "No"]
                                    Layout: =Layout.Horizontal
                                    FillPortions: =1
                        - conRow_ApprovalObtained_4:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                              LayoutAlignItems: =LayoutAlignItems.Stretch
                              LayoutMinHeight: =70
                            Children:
                              - lblApprovalObtained_4:
                                  Control: Label@2.5.1
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    Fill: =RGBA(226, 209, 240, 1)
                                    FontWeight: =FontWeight.Bold
                                    Text: ="If outside scope, approval obtained? *"
                                    Width: =300
                                    PaddingLeft: =10
                                    VerticalAlign: =VerticalAlign.Middle
                              - radApprovalObtained_4:
                                  Control: Radio@0.0.25
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Center
                                    Items: =["Yes", "No"]
                                    Layout: =Layout.Horizontal
                                    FillPortions: =1
            - Footer_S3:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =60
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  PaddingLeft: =20
                  PaddingRight: =20
                Children:
                  - btnBack_S3:
                      Control: Classic/Button@2.2.0
                      Properties:
                        Fill: =RGBA(166, 166, 166, 1)
                        OnSelect: =Navigate(Screen2_SupplierDetails)
                        Text: ="Back"
                  - btnSubmit_4:
                      Control: Classic/Button@2.2.0
                      Properties:
                        DisplayMode: |
                          =If(
                              IsBlank(txtReason_5.Text) || IsBlank(txtServiceType_5.Text),
                              DisplayMode.Disabled,
                              DisplayMode.Edit
                          )
                        OnSelect: |
                          =Collect(
                              colSupplierRequests,
                              {
                                  Title: "New Request",
                                  Reason: txtReason_5.Text,
                                  ServiceType: txtServiceType_5.Text,
                                  Description: txtDescription_5.Text,
                                  Urgent: radUrgent_5.Selected.Value,
                                  SupplierName: txtSupplierName_4.Text,
                                  ContactEmail: txtContactEmail_4.Text
                              }
                          );
                          Notify("Request Submitted Successfully", NotificationType.Success);
                          Navigate(Screen1_ServiceDetails_1)
                        Text: ="Submit Request"
