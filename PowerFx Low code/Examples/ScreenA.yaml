Screens:
  HomeScreen:
    Children:
      - ScreenContainer2_5:
          Control: GroupContainer@1.3.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - Header2_5:
                Control: Header@0.0.44
                Properties:
                  IsTitleVisible: =false
                  Logo: =psa_second2
                  OnSelectLogo: =Back()
                  Title: ="Purchase Request Admin"
                  X: =40
                  Y: =40
            - HeaderContainer2_5:
                Control: GroupContainer@1.3.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =75
                  LayoutDirection: =LayoutDirection.Horizontal
                Children:
                  - envText:
                      Control: Text@0.0.51
                      Properties:
                        Align: ='TextCanvas.Align'.Center
                        AutoHeight: =true
                        Fill: =RGBA(109, 49, 162, 1)
                        FillPortions: =1
                        Font: =Font.'Lato Black'
                        FontColor: =RGBA(255, 255, 255, 1)
                        Size: =22
                        Text: |-
                          ="Hi " & fmCurrentUser.displayName & " 📊"
                        VerticalAlign: =VerticalAlign.Middle
            - PurchContainer_1:
                Control: GroupContainer@1.3.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(245, 245, 245, 1)
                  FillPortions: =0
                  Height: =
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =16
                  LayoutWrap: =true
                  PaddingBottom: =2
                  PaddingLeft: =2
                  PaddingRight: =2
                  PaddingTop: =2
                Children:
                  - FormContainer1_5:
                      Control: GroupContainer@1.3.0
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =7
                        Height: =
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =16
                        PaddingBottom: =15
                        PaddingLeft: =15
                        PaddingRight: =15
                        PaddingTop: =15
            - Image2:
                Control: Image@2.2.3
                Properties:
                  FillPortions: =1
                  Image: ='PHS proc  Logo'
            - ButtonCanvas1:
                Control: Button@0.0.45
                Properties:
                  OnSelect: |-
                    =If(
                        IsAdmin,
                        Navigate(ProcurRequestMain),
                        If(
                            fmCurrentUser.displayName = "Richie RevellWareham",
                            Navigate(ProcurRequestMain)
                        ),
                        Notify(
                            User().FullName & " Current user is not Authorise or not Procurement Admininstrator only",
                            NotificationType.Warning,
                            1000
                        ),
                        Notify(
                            User().FullName & " This Procurement Admininstrator only",
                            NotificationType.Warning
                        )
                    )
                  Text: ="Go To Main Screen"
