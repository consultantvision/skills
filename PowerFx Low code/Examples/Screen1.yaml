Screens:
  Home Screen:
    Children:
      - ScreenContainer1:
          Control: GroupContainer@1.3.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - HeaderContainer1:
                Control: GroupContainer@1.3.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =75
                  LayoutDirection: =LayoutDirection.Horizontal
                  RadiusBottomLeft: =8
                  RadiusBottomRight: =8
                  RadiusTopLeft: =8
                  RadiusTopRight: =8
                Children:
                  - Header1:
                      Control: Header@0.0.44
                      Properties:
                        Logo: =psa_second2
                        Title: ="Welcome " & fmUserFirstName
            - MainContainer1:
                Control: GroupContainer@1.3.0
                Variant: AutoLayout
                Properties:
                  DropShadow: =DropShadow.Semibold
                  Fill: =RGBA(245, 245, 245, 1)
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutMinWidth: =200
                  LayoutWrap: =true
                  PaddingBottom: =2
                  PaddingLeft: =2
                  PaddingRight: =2
                  PaddingTop: =2
                  RadiusBottomLeft: =0
                  RadiusBottomRight: =0
                  RadiusTopLeft: =0
                  RadiusTopRight: =0
                Children:
                  - Container1:
                      Control: GroupContainer@1.3.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        DropShadow: =DropShadow.Semibold
                        Fill: =RGBA(109, 49, 162, 0.63)
                        FillPortions: =0
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =5
                        LayoutJustifyContent: =LayoutJustifyContent.Center
                        LayoutMinHeight: =300
                        LayoutMinWidth: |+
                          =200
                        LayoutOverflowY: =LayoutOverflow.Scroll
                        PaddingBottom: =10
                        PaddingLeft: =5
                        PaddingRight: =5
                        PaddingTop: =10
                      Children:
                        - TitleContainer1:
                            Control: GroupContainer@1.3.0
                            Variant: AutoLayout
                            Properties:
                              DropShadow: =DropShadow.None
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutMinWidth: =Container1.Width
                              PaddingTop: =20
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Width: |+
                                =300
                            Children:
                              - FeatureItemButton1:
                                  Control: Button@0.0.45
                                  Properties:
                                    AccessibleLabel: ="Featured item button"
                                    Appearance: ='ButtonCanvas.Appearance'.Primary
                                    BasePaletteColor: =RGBA(168, 110, 235, 1)
                                    Font: =Font.'Lato Black'
                                    FontSize: =20
                                    FontWeight: =FontWeight.Bold
                                    Height: =150
                                    Icon: ="Add"
                                    IconStyle: ='ButtonCanvas.IconStyle'.Filled
                                    LayoutMinWidth: =Parent.Width
                                    OnSelect: |-
                                      =Set(
                                          varMenuID,
                                          1
                                      );
                                      Refresh(hsa_SupplierfeedbackList);
                                      Refresh(hsa_SupplierRequestList);
                                      Refresh(hsa_purchaserequestList);
                                      Refresh(hsa_maintencerequest);
                                      Navigate('Form Screen Main');
                                    Text: ="Continue to Request Forms"
                                    VerticalAlign: =VerticalAlign.Middle
                                    Width: =Parent.Width
                              - DescriptionText1:
                                  Control: Text@0.0.51
                                  Properties:
                                    Align: ='TextCanvas.Align'.Start
                                    AlignInContainer: =AlignInContainer.Stretch
                                    AutoHeight: =true
                                    BorderStyle: =BorderStyle.None
                                    Fill: =RGBA(255, 255, 255, 1)
                                    FillPortions: =1
                                    Font: =Font.Arial
                                    FontColor: =RGBA(109, 49, 162, 1)
                                    LayoutMinWidth: =Parent.Width
                                    Size: =16
                                    Text: |-
                                      ="

                                      ➖ Welcome to the Procurement Request Tool . Please click on 
                                            the above to select from the following options

                                      ➖ Maintenance Request 👷🏼- for adhoc or out of sequence 
                                            repairs/maintenance to equipment

                                      ➖ Purchase Request 💻- for medical and non medical requests

                                      ➖ Supplier Feedback ✍🏼- an area to provide feedback on any 
                                            supplier

                                      ➖ Supplier request 🛒- to be used when you have identified a 
                                            preferred service provide"
                                    VerticalAlign: =VerticalAlign.Top
                                    Weight: ='TextCanvas.Weight'.Semibold
                                    Width: =480
                  - Container41:
                      Control: GroupContainer@1.3.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        Fill: =RGBA(255, 255, 255, 1)
                        LayoutAlignItems: =LayoutAlignItems.Center
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =5
                        LayoutJustifyContent: =LayoutJustifyContent.Center
                        LayoutMinHeight: =300
                        LayoutMinWidth: =If('Home Screen'.Size = ScreenSize.Small, Parent.Width, 400)
                        LayoutOverflowY: =LayoutOverflow.Scroll
                        PaddingBottom: =10
                        PaddingLeft: =5
                        PaddingRight: =5
                        PaddingTop: =10
                      Children:
                        - ImageContainer41:
                            Control: GroupContainer@1.3.0
                            Variant: AutoLayout
                            Properties:
                              AlignInContainer: =AlignInContainer.Center
                              DropShadow: =DropShadow.None
                              Fill: =RGBA(109, 49, 162, 1)
                              FillPortions: =1.5
                              LayoutAlignItems: =LayoutAlignItems.Center
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =5
                              LayoutJustifyContent: =LayoutJustifyContent.End
                              LayoutMinWidth: =Container41.Width
                              RadiusBottomLeft: =0
                              RadiusBottomRight: =0
                              RadiusTopLeft: =0
                              RadiusTopRight: =0
                              Width: =Parent.Width
                            Children:
                              - Image41:
                                  Control: Image@2.2.3
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Stretch
                                    AutoDisableOnSelect: =false
                                    DisplayMode: =DisplayMode.View
                                    Fill: =RGBA(180, 214, 250, 1)
                                    FillPortions: =1
                                    Image: =procurement_highlight_bg_purple
                                    ImagePosition: =ImagePosition.Fill
                                    RadiusBottomLeft: =90
                                    RadiusBottomRight: =90
                                    RadiusTopLeft: =90
                                    RadiusTopRight: =90
                                    Transparency: =
                                    Width: =560
