Screens:
  Screen2_SupplierDetails:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      OnVisible: |
        =UpdateContext({ varCurrentStep: 2 })
    Children:
      - MainContainer_S2:
          Control: GroupContainer@1.4.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =10
            PaddingBottom: =10
            PaddingLeft: =10
            PaddingRight: =10
            PaddingTop: =10
            Width: =Parent.Width
          Children:
            - Dashboard_S2:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =140
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =10
                  LayoutMaxHeight: =120
                  LayoutMinHeight: =50
                  PaddingBottom: =10
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =10
                Children:
                  - lblTitle_S2:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =RGBA(102, 51, 153, 1)
                        FontWeight: =FontWeight.Bold
                        Size: =20
                        Text: ="New Supplier Onboarding Request"
                  - conSteps_S2:
                      Control: GroupContainer@1.4.0
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =40
                        LayoutJustifyContent: =LayoutJustifyContent.Center
                        LayoutMaxHeight: =50
                        LayoutMinHeight: =50
                      Children:
                        - lblStep1_S2_Gray:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(166, 166, 166, 1)
                              Text: ="1. Service Details"
                        - lblStep2_S2:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(102, 51, 153, 1)
                              FontWeight: =FontWeight.Bold
                              Text: ="2. Admin & Supplier"
                        - lblStep3_S2_Gray:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(166, 166, 166, 1)
                              Text: ="3. Procurement"
            - ScrollContent_S2:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =20
                  LayoutOverflowY: =LayoutOverflow.Scroll
                Children:
                  - Header_Supplier_S2:
                      Control: Label@2.5.1
                      Properties:
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =RGBA(255, 255, 255, 1)
                        Fill: =RGBA(102, 51, 153, 1)
                        FontWeight: =FontWeight.Bold
                        PaddingLeft: =10
                        Size: =16
                        Text: ="Administrative & Supplier Details"
                  - conSupplier_4:
                      Control: GroupContainer@1.4.0
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =20
                        PaddingLeft: =20
                        PaddingRight: =20
                        Width: =Parent.Width - 40
                      Children:
                        - conSupplierLeft_2:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =15
                            Children:
                              - conRow_SupplierName_4:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =10
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                  Children:
                                    - lblSupplierName_4:
                                        Control: Label@2.5.1
                                        Properties:
                                          FontWeight: =FontWeight.Bold
                                          Text: ="Proposed Supplier Name *"
                                          Width: =225
                                    - txtSupplierName_4:
                                        Control: Classic/TextInput@2.3.2
                                        Properties:
                                          FillPortions: =1
                              - conRow_ContactDetails_4:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =10
                                    LayoutAlignItems: =LayoutAlignItems.Stretch
                                  Children:
                                    - lblContactDetails_4:
                                        Control: Label@2.5.1
                                        Properties:
                                          FontWeight: =FontWeight.Bold
                                          Text: ="Supplier Contact Details"
                                          Width: =225
                                          VerticalAlign: =VerticalAlign.Top
                                    - conContactDetailsNested_4:
                                        Control: GroupContainer@1.4.0
                                        Variant: AutoLayout
                                        Properties:
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =5
                                          FillPortions: =1
                                        Children:
                                          - conSubRow_Name_4:
                                              Control: GroupContainer@1.4.0
                                              Variant: AutoLayout
                                              Properties:
                                                LayoutDirection: =LayoutDirection.Horizontal
                                                LayoutGap: =10
                                                LayoutAlignItems: =LayoutAlignItems.Center
                                              Children:
                                                - lblContactName_4:
                                                    Control: Label@2.5.1
                                                    Properties:
                                                      Text: ="Name"
                                                      Width: =80
                                                      FontWeight: =FontWeight.Bold
                                                - txtContactName_4:
                                                    Control: Classic/TextInput@2.3.2
                                                    Properties:
                                                      FillPortions: =1
                                          - conSubRow_Role_4:
                                              Control: GroupContainer@1.4.0
                                              Variant: AutoLayout
                                              Properties:
                                                LayoutDirection: =LayoutDirection.Horizontal
                                                LayoutGap: =10
                                                LayoutAlignItems: =LayoutAlignItems.Center
                                              Children:
                                                - lblContactRole_4:
                                                    Control: Label@2.5.1
                                                    Properties:
                                                      Text: ="Role"
                                                      Width: =80
                                                      FontWeight: =FontWeight.Bold
                                                - txtContactRole_4:
                                                    Control: Classic/TextInput@2.3.2
                                                    Properties:
                                                      FillPortions: =1
                                          - conSubRow_Phone_4:
                                              Control: GroupContainer@1.4.0
                                              Variant: AutoLayout
                                              Properties:
                                                LayoutDirection: =LayoutDirection.Horizontal
                                                LayoutGap: =10
                                                LayoutAlignItems: =LayoutAlignItems.Center
                                              Children:
                                                - lblContactPhone_4:
                                                    Control: Label@2.5.1
                                                    Properties:
                                                      Text: ="Phone"
                                                      Width: =80
                                                      FontWeight: =FontWeight.Bold
                                                - txtContactPhone_4:
                                                    Control: Classic/TextInput@2.3.2
                                                    Properties:
                                                      FillPortions: =1
                                          - conSubRow_Email_4:
                                              Control: GroupContainer@1.4.0
                                              Variant: AutoLayout
                                              Properties:
                                                LayoutDirection: =LayoutDirection.Horizontal
                                                LayoutGap: =10
                                                LayoutAlignItems: =LayoutAlignItems.Center
                                              Children:
                                                - lblContactEmail_4:
                                                    Control: Label@2.5.1
                                                    Properties:
                                                      Text: ="Email"
                                                      Width: =80
                                                      FontWeight: =FontWeight.Bold
                                                - txtContactEmail_4:
                                                    Control: Classic/TextInput@2.3.2
                                                    Properties:
                                                      FillPortions: =1
                                          - conSubRow_Address_4:
                                              Control: GroupContainer@1.4.0
                                              Variant: AutoLayout
                                              Properties:
                                                LayoutDirection: =LayoutDirection.Horizontal
                                                LayoutGap: =10
                                                LayoutAlignItems: =LayoutAlignItems.Stretch
                                              Children:
                                                - lblContactAddress_4:
                                                    Control: Label@2.5.1
                                                    Properties:
                                                      Text: ="Address"
                                                      Width: =80
                                                      FontWeight: =FontWeight.Bold
                                                      VerticalAlign: =VerticalAlign.Top
                                                - conAddressInputs_4:
                                                    Control: GroupContainer@1.4.0
                                                    Variant: AutoLayout
                                                    Properties:
                                                      LayoutDirection: =LayoutDirection.Vertical
                                                      LayoutGap: =5
                                                      FillPortions: =1
                                                    Children:
                                                      - txtContactAddressLine1_4:
                                                          Control: Classic/TextInput@2.3.2
                                                          Properties:
                                                            HintText: ="Address Line 1"
                                                      - txtContactAddressLine2_4:
                                                          Control: Classic/TextInput@2.3.2
                                                          Properties:
                                                            HintText: ="Address Line 2"
                        - conSupplierRight_2:
                            Control: GroupContainer@1.4.0
                            Variant: AutoLayout
                            Properties:
                              LayoutDirection: =LayoutDirection.Vertical
                              LayoutGap: =15
                            Children:
                              - conRow_ABN_4:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =10
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                  Children:
                                    - lblABN_4:
                                        Control: Label@2.5.1
                                        Properties:
                                          FontWeight: =FontWeight.Bold
                                          Text: ="ABN/ACN (if known)"
                                          Width: =225
                                    - txtABN_4:
                                        Control: Classic/TextInput@2.3.2
                                        Properties:
                                          FillPortions: =1
                              - conRow_Preexisting_4:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =10
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                  Children:
                                    - lblPreexisting_4:
                                        Control: Label@2.5.1
                                        Properties:
                                          FontWeight: =FontWeight.Bold
                                          Text: ="Relates to preexisting supplier? *"
                                          Width: =225
                                    - radPreexisting_4:
                                        Control: Radio@0.0.25
                                        Properties:
                                          Items: =["Yes", "No"]
                                          Layout: =Layout.Horizontal
                                          FillPortions: =1
                              - conRow_ContractDuration_4:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =10
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                  Children:
                                    - lblContractDuration_4:
                                        Control: Label@2.5.1
                                        Properties:
                                          FontWeight: =FontWeight.Bold
                                          Text: ="Estimated contract duration *"
                                          Width: =225
                                    - txtContractDuration_4:
                                        Control: Classic/TextInput@2.3.2
                                        Properties:
                                          FillPortions: =1
                              - conRow_EstimatedSpend_4:
                                  Control: GroupContainer@1.4.0
                                  Variant: AutoLayout
                                  Properties:
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutGap: =10
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                  Children:
                                    - lblEstimatedSpend_4:
                                        Control: Label@2.5.1
                                        Properties:
                                          FontWeight: =FontWeight.Bold
                                          Text: ="Estimated Spend / Frequency"
                                          Width: =225
                                    - txtEstimatedSpend_4:
                                        Control: Classic/TextInput@2.3.2
                                        Properties:
                                          FillPortions: =1
            - Footer_S2:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  Height: =60
                  LayoutAlignItems: =LayoutAlignItems.Center
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutJustifyContent: =LayoutJustifyContent.SpaceBetween
                  LayoutMaxHeight: =55
                  LayoutMinHeight: =50
                  PaddingLeft: =20
                  PaddingRight: =20
                Children:
                  - btnBack_S2:
                      Control: Classic/Button@2.2.0
                      Properties:
                        Fill: =RGBA(166, 166, 166, 1)
                        OnSelect: =Navigate(Screen1_ServiceDetails_1)
                        Text: ="Back"
                  - btnNext_S2:
                      Control: Classic/Button@2.2.0
                      Properties:
                        OnSelect: =Navigate(Screen3_Procurement)
                        Text: ="Next"
