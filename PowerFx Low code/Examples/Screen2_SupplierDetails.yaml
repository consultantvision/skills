Screens:
  Screen1_ServiceDetails:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
      OnVisible: |
        =UpdateContext({ varCurrentStep: 1 })
    Children:
      - MainContainer_S1:
          Control: GroupContainer@1.4.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =10
            PaddingBottom: =10
            PaddingLeft: =10
            PaddingRight: =10
            PaddingTop: =10
            Width: =Parent.Width
          Children:
            - Dashboard_S1:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  Height: =140
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =10
                  LayoutMaxHeight: =120
                  LayoutMinHeight: =50
                  PaddingBottom: =10
                  PaddingLeft: =20
                  PaddingRight: =20
                  PaddingTop: =10
                Children:
                  - lblTitle_S1:
                      Control: Label@2.5.1
                      Properties:
                        Align: =Align.Center
                        AlignInContainer: =AlignInContainer.Stretch
                        Color: =RGBA(102, 51, 153, 1)
                        FontWeight: =FontWeight.Bold
                        Size: =20
                        Text: ="New Supplier Onboarding Request"
                  - conSteps_S1:
                      Control: GroupContainer@1.4.0
                      Variant: AutoLayout
                      Properties:
                        LayoutDirection: =LayoutDirection.Horizontal
                        LayoutGap: =40
                        LayoutJustifyContent: =LayoutJustifyContent.Center
                        LayoutMaxHeight: =50
                        LayoutMinHeight: =50
                      Children:
                        - lblStep1_S1:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(102, 51, 153, 1)
                              FontWeight: =FontWeight.Bold
                              Text: ="1. Service Details"
                        - lblStep2_S1_Gray:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(166, 166, 166, 1)
                              Text: ="2. Admin & Supplier"
                        - lblStep3_S1_Gray:
                            Control: Label@2.5.1
                            Properties:
                              Color: =RGBA(166, 166, 166, 1)
                              Text: ="3. Procurement"
            - ScrollContent_S1:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Vertical
                  LayoutGap: =20
                  LayoutOverflowX: =LayoutOverflow.Scroll
                  LayoutOverflowY: =LayoutOverflow.Scroll
                  LayoutWrap: =true
                Children:
                  - conFields_S1:
                      Control: GroupContainer@1.4.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.SetByContainer
                        LayoutAlignItems: =LayoutAlignItems.Stretch
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =15
                        LayoutOverflowX: =LayoutOverflow.Scroll
                        LayoutOverflowY: =LayoutOverflow.Scroll
                        PaddingLeft: =20
                        PaddingRight: =20
                        Width: =Parent.Width - 40
                      Children:
                        - lblReason_4:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="1. Reason for Request *"
                        - txtReason_4:
                            Control: Classic/TextInput@2.3.2
                            Properties:
                              Height: =60
                              Mode: =TextInputMode.Multiline
                        - lblServiceType_4:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="2. Service Type/Specialty *"
                        - txtServiceType_4:
                            Control: Classic/TextInput@2.3.2
                        - lblDescription_4:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="3. Description of Service Required *"
                        - txtDescription_4:
                            Control: Classic/TextInput@2.3.2
                            Properties:
                              Height: =100
                              Mode: =TextInputMode.Multiline
                        - lblLocation_4:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="4. Location / Delivery Requirements *"
                        - cmbLocation_4:
                            Control: ComboBox@0.0.51
                            Properties:
                              Items: =["IDC Onsite", "IDC Offsite", "RD"]
                              SelectMultiple: =true
                        - lblLocationDetails_2:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="5. Details"
                        - txtLocationDetails_2:
                            Control: Classic/TextInput@2.3.2
                            Properties:
                              Height: =60
                              Mode: =TextInputMode.Multiline
                        - lblReferral_2:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="6. Origin of Referral"
                        - txtReferral_2:
                            Control: Classic/TextInput@2.3.2
                        - lblPublicProvider_4:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="7. Is a public provider able to fulfill this requirement? *"
                        - radPublicProvider_4:
                            Control: Radio@0.0.25
                            Properties:
                              Items: =["Yes", "No", "N/A"]
                              Layout: =Layout.Horizontal
                        - lblPublicProviderDetails_4:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="8. Details"
                        - txtPublicProviderDetails_4:
                            Control: Classic/TextInput@2.3.2
                            Properties:
                              Height: =60
                              Mode: =TextInputMode.Multiline
                        - lblWaitlist_4:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="9. Is the client on a public waitlist?"
                        - radWaitlist_4:
                            Control: Radio@0.0.25
                            Properties:
                              Items: =["Yes", "No", "N/A"]
                              Layout: =Layout.Horizontal
                        - lblWaitlistYes_2:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="10. If yes, please provide hospital or relevant details"
                        - txtWaitlistYes_2:
                            Control: Classic/TextInput@2.3.2
                            Properties:
                              Height: =60
                              Mode: =TextInputMode.Multiline
                              Visible: =radWaitlist_4.Selected.Value = "Yes"
                        - lblWaitlistNo_2:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="11. If no, please explain why"
                        - txtWaitlistNo_2:
                            Control: Classic/TextInput@2.3.2
                            Properties:
                              Height: =60
                              Mode: =TextInputMode.Multiline
                              Visible: =radWaitlist_4.Selected.Value = "No"
                        - lblExistingSupplier_4:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="12. Is there an existing supplier that could service this client?"
                        - radExistingSupplier_4:
                            Control: Radio@0.0.25
                            Properties:
                              Items: =["Yes", "No"]
                              Layout: =Layout.Horizontal
                        - lblExistingSupplierYes_2:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="13. If yes, please explain why they've not been utilised"
                        - txtExistingSupplierYes_2:
                            Control: Classic/TextInput@2.3.2
                            Properties:
                              Height: =60
                              Mode: =TextInputMode.Multiline
                              Visible: =radExistingSupplier_4.Selected.Value = "Yes"
                        - lblUrgent_4:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="14. Is this an urgent request? *"
                        - radUrgent_4:
                            Control: Radio@0.0.25
                            Properties:
                              Items: =["Yes", "No"]
                              Layout: =Layout.Horizontal
                        - lblUrgentReason_4:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="15. If yes, please explain why"
                        - txtUrgentReason_4:
                            Control: Classic/TextInput@2.3.2
                            Properties:
                              Height: =60
                              Mode: =TextInputMode.Multiline
                              Visible: =radUrgent_4.Selected.Value = "Yes"
                        - lblAdditionalSpec_4:
                            Control: Label@2.5.1
                            Properties:
                              FontWeight: =FontWeight.Bold
                              Text: ="16. Additional / Non-clinical Specification"
                        - txtAdditionalSpec_4:
                            Control: Classic/TextInput@2.3.2
                            Properties:
                              Height: =60
                              Mode: =TextInputMode.Multiline
            - Footer_S1:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  FillPortions: =0
                  Height: =60
                  LayoutAlignItems: =LayoutAlignItems.End
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutJustifyContent: =LayoutJustifyContent.End
                  PaddingRight: =20
                Children:
                  - btnNext_S1:
                      Control: Classic/Button@2.2.0
                      Properties:
                        AlignInContainer: =AlignInContainer.Center
                        OnSelect: =Navigate(Screen2_SupplierDetails)
                        Text: ="Next"
