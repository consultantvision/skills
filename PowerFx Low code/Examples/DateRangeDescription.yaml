Screens:
  Screen1_DateEntry:
    Properties:
      Fill: =RGBA(255, 255, 255, 1)
    Children:
      - MainContainer:
          Control: GroupContainer@1.4.0
          Variant: AutoLayout
          Properties:
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =20
            PaddingTop: =20
            PaddingLeft: =20
            PaddingRight: =20
            PaddingBottom: =20
          Children:
            - conRow_StartDate:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutAlignItems: =LayoutAlignItems.Center
                Children:
                  - lblStart:
                      Control: Label@2.5.1
                      Properties:
                        Text: ="Start Date"
                        Width: =150
                  - datStart:
                      Control: Classic/DatePicker
                      Properties:
                        FillPortions: =1
            - conRow_EndDate:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutAlignItems: =LayoutAlignItems.Center
                Children:
                  - lblEnd:
                      Control: Label@2.5.1
                      Properties:
                        Text: ="End Date"
                        Width: =150
                  - datEnd:
                      Control: Classic/DatePicker
                      Properties:
                        FillPortions: =1
            - conRow_Description:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =10
                  LayoutAlignItems: =LayoutAlignItems.Start
                Children:
                  - lblDesc:
                      Control: Label@2.5.1
                      Properties:
                        Text: ="Description"
                        Width: =150
                        PaddingTop: =10
                  - txtDesc:
                      Control: Classic/TextInput@2.3.2
                      Properties:
                        Mode: =TextInputMode.Multiline
                        HintText: ="Enter description here..."
                        Height: =150
                        FillPortions: =1
            - conRow_Actions:
                Control: GroupContainer@1.4.0
                Variant: AutoLayout
                Properties:
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutJustifyContent: =LayoutJustifyContent.End
                  LayoutGap: =10
                  PaddingTop: =20
                Children:
                  - btnCancel:
                      Control: Classic/Button
                      Properties:
                        Text: ="Cancel"
                        Width: =150
                        OnSelect: =Back()
                  - btnSubmit:
                      Control: Classic/Button
                      Properties:
                        Text: ="Submit"
                        Width: =150
