Screens:
  Screen1:
    Children:
      - Gal_week:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            BorderThickness: =2
            Height: =66
            Items: =["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"]
            TemplateSize: =41
            Width: =1326
            WrapCount: =7
            X: =20
            Y: =76
          Children:
            - TextCanvas1:
                Control: Text@0.0.51
                Properties:
                  Align: ='TextCanvas.Align'.Center
                  Fill: =RGBA(152, 208, 70, 1)
                  Size: =20
                  Text: =ThisItem.Value
                  Width: =Gal_week.TemplateWidth - 20
                  X: =10
                  Y: =10
      - Gal_MonthCalendar:
          Control: Gallery@2.15.0
          Variant: Vertical
          Properties:
            Height: =502
            Items: =Var_MonthCalendarItems
            TemplateFill: |-
              =If(
                  ThisItem.ItemDate >= Var_CalendarMonth && ThisItem.ItemDate < DateAdd(
                      Var_CalendarMonth,
                      1,
                      TimeUnit.Months
                  ),
                  If(
                      ib_Visit.Visible,
                      Color.LightSalmon,
                      Color.White
                  ),
                  Color.LightGray
              )
            TemplateSize: =69
            Width: =1328
            WrapCount: =7
            X: =20
            Y: =157
          Children:
            - TextCanvas4:
                Control: Text@0.0.51
                Properties:
                  Height: =27
                  Text: =Day(ThisItem.ItemDate)
                  Width: =86
                  X: =12
            - ib_Visit:
                Control: InfoButton@0.0.33
                Properties:
                  Content: |-
                    =LookUp(col_CurrentMonthHolidays,ThisItem.ItemDate =ThisRecord.vsVisitDate).Title & " 
                    " & LookUp(col_CurrentMonthHolidays,ThisItem.ItemDate =ThisRecord.vsVisitDate).vsDescription
                  OnSelect: =Select(Parent)
                  Visible: =Trim(Self.Content) <> ""
                  Y: =37
            - Gallery1_1:
                Control: Gallery@2.15.0
                Variant: BrowseLayout_Vertical_OneTextVariant_ver5.0
                Properties:
                  Fill: =RGBA(100, 0, 0, .2)
                  Height: =69
                  Items: |-
                    =If(Month(ThisItem.ItemDate) = Month(Var_CalendarMonth),Filter(
                        col_CurrentMonthEvents,
                        ThisRecord.End >= ThisItem.ItemDate && ThisRecord.Start < DateAdd(
                            ThisItem.ItemDate,
                            1,
                            TimeUnit.Days
                        )
                    ))
                  TemplateSize: =22
                  Width: =154
                  X: =30
                Children:
                  - Title2_1:
                      Control: Label@2.5.1
                      Properties:
                        BorderColor: =RGBA(0, 0, 0, 1)
                        Color: =RGBA(50, 49, 48, 1)
                        FontWeight: =If(ThisItem.IsSelected, FontWeight.Semibold, FontWeight.Normal)
                        Height: =Self.Size * 1.8
                        OnSelect: =Select(Parent)
                        PaddingBottom: =0
                        PaddingLeft: =0
                        PaddingRight: =0
                        PaddingTop: =0
                        Size: =10
                        Text: =ThisItem.Title
                        Tooltip: =Self.Text
                        VerticalAlign: =VerticalAlign.Top
                        Width: =Parent.TemplateWidth - 20
                  - Separator2_1:
                      Control: Rectangle@2.3.0
                      Properties:
                        Fill: =RGBA(255, 255, 255, 1)
                        Height: =2
                        OnSelect: =Select(Parent)
                        Width: =Parent.TemplateWidth
                        Y: =Parent.TemplateHeight - Self.Height
      - TextCanvas2:
          Control: Text@0.0.51
          Properties:
            Text: =Text(Var_CalendarMonth,"mmm -yyyy")
            X: =36
            Y: =20
      - TextCanvas3:
          Control: Text@0.0.51
          Properties:
            Height: =43
            Text: =FirstSundayOfMonthCalendar
            Width: =236
            X: =20
            Y: =689
      - Icon1:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.ChevronUp
            OnSelect: |-
              =Set(Var_CalendarMonth,DateAdd(Var_CalendarMonth,-1,TimeUnit.Months));
              ClearCollect(col_CurrentMonthEvents,Filter(CalendarVisitor,ThisRecord.Start < DateAdd(Var_CalendarMonth,1,TimeUnit.Months)));
              ClearCollect(col_CurrentMonthHolidays,Filter(SiteVisitors,ThisRecord.vsVisitDate<DateAdd(Var_CalendarMonth,1,TimeUnit.Months),ThisRecord.vsVisitDate>=Var_CalendarMonth))
            X: =1023
            Y: =12
      - Icon2:
          Control: Classic/Icon@2.5.0
          Properties:
            Icon: =Icon.ChevronDown
            OnSelect: |-
              =Set(Var_CalendarMonth,DateAdd(Var_CalendarMonth,1,TimeUnit.Months));

              ClearCollect(col_CurrentMonthEvents,Filter(CalendarVisitor,ThisRecord.Start < DateAdd(Var_CalendarMonth,1,TimeUnit.Months)));

              ClearCollect(col_CurrentMonthHolidays,Filter(SiteVisitors,ThisRecord.vsVisitDate<DateAdd(Var_CalendarMonth,1,TimeUnit.Months),ThisRecord.vsVisitDate>=Var_CalendarMonth))
            X: =1103
            Y: =12
