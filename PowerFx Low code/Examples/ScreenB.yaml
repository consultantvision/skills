Screens:
  ProcurRequestMain:
    Properties:
      OnVisible: =Select(btnResetPO)
    Children:
      - ScreenContainer2_1:
          Control: GroupContainer@1.3.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - Header2_1:
                Control: Header@0.0.44
                Properties:
                  Logo: =psa_second2
                  OnSelectLogo: =Navigate(HomeScreen)
                  Title: ="Purchase Request Admin  "
                  X: =40
                  Y: =40
            - PurchContainer:
                Control: GroupContainer@1.3.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(245, 245, 245, 1)
                  FillPortions: =0
                  Height: =LeftNav_5.Height
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =16
                  LayoutWrap: =true
                  PaddingBottom: =2
                  PaddingLeft: =2
                  PaddingRight: =2
                  PaddingTop: =2
                Children:
                  - SideNav:
                      Control: GroupContainer@1.3.0
                      Variant: AutoLayout
                      Properties:
                        AlignInContainer: =AlignInContainer.Start
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =0
                        Height: =LeftNav_5.Height
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutMinHeight: =0
                        LayoutMinWidth: =100
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =LeftNav_5.Width
                      Children:
                        - LeftNav_5:
                            Control: CanvasComponent
                            ComponentName: LeftNav
                            Properties:
                              FillPortions: =1
                              Height: =App.DesignHeight - 125
                              Width: =If(varMenuOpen,200,80)
                  - FormContainer1_2:
                      Control: GroupContainer@1.3.0
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =7
                        Height: =LeftNav_5.Height
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutGap: =16
                        PaddingBottom: =15
                        PaddingLeft: =15
                        PaddingRight: =15
                        PaddingTop: =15
                      Children:
                        - filterContainer_1:
                            Control: GroupContainer@1.3.0
                            Variant: AutoLayout
                            Properties:
                              Fill: =RGBA(231, 213, 247, 1)
                              FillPortions: =0
                              Height: |-
                                =Switch(
                                    ProcurRequestMain.Size,
                                    ScreenSize.Small,
                                    If(
                                        showFilter,
                                        4 * 80,
                                        50
                                    ),
                                    ScreenSize.Medium,
                                    If(
                                        showFilter,
                                        4 * 50,
                                        50
                                    ),
                                    ScreenSize.Large,
                                    4 * 30,
                                    50
                                )
                              LayoutDirection: =LayoutDirection.Horizontal
                              LayoutGap: =10
                            Children:
                              - btnShowHide_1:
                                  Control: Button@0.0.45
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Center
                                    Icon: ="Eye"
                                    OnSelect: =Set(showFilter,!showFilter)
                                    Text: =If(showFilter,"Close Filter Panel","Open Filter Panel")
                                    Visible: =ProcurRequestMain.Size = ScreenSize.Small || ProcurRequestMain.Size = ScreenSize.Medium
                                    Width: =200
                              - FilterItems:
                                  Control: GroupContainer@1.3.0
                                  Variant: AutoLayout
                                  Properties:
                                    Fill: =App.Theme.Colors.Lighter60
                                    FillPortions: =0
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutMinHeight: =50
                                    Visible: =showFilter || ProcurRequestMain.Size = ScreenSize.Large || ProcurRequestMain.Size = ScreenSize.ExtraLarge
                                    Width: =355
                                  Children:
                                    - TextCanvas2_5:
                                        Control: Text@0.0.51
                                        Properties:
                                          Align: ='TextCanvas.Align'.Center
                                          AlignInContainer: =AlignInContainer.Stretch
                                          AutoHeight: =true
                                          Font: =Font.'Lato Black'
                                          Size: =13
                                          Text: ="Purchase Item"
                                          VerticalAlign: =VerticalAlign.Middle
                                          Width: =95
                                    - txtTitle_1:
                                        Control: TextInput@0.0.54
                                        Properties:
                                          Placeholder: |-
                                            ="🔎 Search Item"
                                          TriggerOutput: ='TextInputCanvas.TriggerOutput'.Delayed
                                          Width: =250
                              - FilterID:
                                  Control: GroupContainer@1.3.0
                                  Variant: AutoLayout
                                  Properties:
                                    Fill: =App.Theme.Colors.Lighter60
                                    FillPortions: =0
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutMinHeight: =50
                                    Visible: =showFilter || ProcurRequestMain.Size = ScreenSize.Large || ProcurRequestMain.Size = ScreenSize.ExtraLarge
                                    Width: =155
                                  Children:
                                    - TextCanvas2_14:
                                        Control: Text@0.0.51
                                        Properties:
                                          Align: ='TextCanvas.Align'.Center
                                          AutoHeight: =true
                                          Font: =Font.'Lato Black'
                                          Size: =13
                                          Text: ="ID"
                                          VerticalAlign: =VerticalAlign.Middle
                                          Width: =35
                                    - txtID:
                                        Control: TextInput@0.0.54
                                        Properties:
                                          Align: =Align.Left
                                          Placeholder: |-
                                            ="🔎 Find ID.."
                                          TriggerOutput: ='TextInputCanvas.TriggerOutput'.Delayed
                                          Width: =110
                              - statusFilter_1:
                                  Control: GroupContainer@1.3.0
                                  Variant: AutoLayout
                                  Properties:
                                    Fill: =App.Theme.Colors.Lighter60
                                    FillPortions: =0
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutMinHeight: =50
                                    Visible: =showFilter || ProcurRequestMain.Size = ScreenSize.Large || ProcurRequestMain.Size = ScreenSize.ExtraLarge
                                    Width: =270
                                  Children:
                                    - TextCanvas2_6:
                                        Control: Text@0.0.51
                                        Properties:
                                          Align: ='TextCanvas.Align'.Center
                                          AutoHeight: =true
                                          Font: =Font.'Lato Black'
                                          Size: =13
                                          Text: ="Status"
                                          VerticalAlign: =VerticalAlign.Middle
                                          Width: =60
                                    - drpStatus_1:
                                        Control: ComboBox@0.0.51
                                        Properties:
                                          Items: =Choices(hsa_purchaserequestList_1.Status)
                                          SelectMultiple: =true
                                          TriggerOutput: ='ComboboxCanvas.TriggerOutput'.Delayed
                                          Width: =200
                              - assignedToFilter_1:
                                  Control: GroupContainer@1.3.0
                                  Variant: AutoLayout
                                  Properties:
                                    Fill: =App.Theme.Colors.Lighter60
                                    FillPortions: =0
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Horizontal
                                    LayoutMinHeight: =50
                                    Visible: =showFilter || ProcurRequestMain.Size = ScreenSize.Large || ProcurRequestMain.Size = ScreenSize.ExtraLarge
                                    Width: =175
                                  Children:
                                    - TextCanvas2_7:
                                        Control: Text@0.0.51
                                        Properties:
                                          Align: ='TextCanvas.Align'.Center
                                          AutoHeight: =true
                                          Font: =Font.'Lato Black'
                                          Size: =13
                                          Text: ="Assigned To"
                                          VerticalAlign: =VerticalAlign.Middle
                                          Width: =80
                                    - tglassignto:
                                        Control: Toggle@1.1.5
                                        Properties:
                                          Label: ="Me"
                              - btnResetPO:
                                  Control: Button@0.0.45
                                  Properties:
                                    AlignInContainer: =AlignInContainer.Center
                                    Icon: ="ArrowReset"
                                    Layout: ='ButtonCanvas.Layout'.IconOnly
                                    OnSelect: |-
                                      =Reset(txtTitle_1);
                                      Reset(txtID);
                                      Reset(drpStatus_1);
                                      Reset(tglassignto);
                                      Refresh('hsa_purchaserequestList_1')
                                    Visible: =showFilter || ProcurRequestMain.Size = ScreenSize.Large || ProcurRequestMain.Size = ScreenSize.ExtraLarge
                                    Width: =32
                        - Container1_3:
                            Control: GroupContainer@1.3.0
                            Variant: AutoLayout
                            Properties:
                              Fill: =RGBA(255, 255, 255, 1)
                              FillPortions: =0
                              Height: =50
                              LayoutDirection: =LayoutDirection.Horizontal
                            Children:
                              - Toolbar2_1:
                                  Control: Toolbar@2.0.5
                                  Properties:
                                    Items: |-
                                      =Table(
                                          {
                                              ItemKey: "view",
                                              ItemDisplayName: "View",
                                              ItemIconName: "Eye",
                                              ItemAppearance: "Subtle",
                                              ItemIconStyle: "Regular",
                                              ItemDisabled: IsBlank(tblProcurement.Selected.ID)
                                          },
                                          {
                                              ItemKey: "edit",
                                              ItemDisplayName: "Edit",
                                              ItemIconName: "Edit",
                                              ItemAppearance: "Subtle",
                                              ItemIconStyle: "Regular",
                                              ItemDisabled: IsBlank(tblProcurement.Selected.ID)
                                          }
                                      )
                                    Layout: ='Toolbar.Layout'.IconAfter
                                    OnSelect: |-
                                      =Switch(
                                          Self.Selected.ItemKey,
                                          "edit",
                                          Set(
                                              varFormMode,
                                              FormMode.Edit
                                          );
                                          ResetForm(Form_Purchase);
                                          Navigate(EditProcRequest),
                                          "view",
                                          Set(
                                              varFormMode,
                                              FormMode.View
                                          );
                                          ResetForm(Form_Purchase);
                                          Navigate(EditProcRequest),
                                          Notify("Unrecognized button clicked")
                                      )
                                      /*"delete",
                                          Remove(
                                              'hsa_purchaserequestList_1',
                                              tblProcurement.Selected
                                          );
                                          Notify(
                                              "Record has been deleted",
                                              NotificationType.Success
                                          ),/* Action for 'info' */
                        - tblProcurement:
                            Control: Table@1.0.278
                            Properties:
                              AlignInContainer: =AlignInContainer.Stretch
                              EnableMultipleSelection: ='PowerAppsOneGrid.EnableMultipleSelection'.Disable
                              EnableRangeSelection: ='PowerAppsOneGrid.EnableRangeSelection'.Disable
                              FillPortions: =1
                              Font: =Font.'Open Sans'
                              FontSize: =dynamicTableFontSize
                              HeaderFont: =Font.'Patrick Hand'
                              HeaderFontColor: =App.Theme.Colors.Primary
                              HeaderFontSize: =20
                              Items: |-
                                =Filter(
                                    hsa_purchaserequestList_1,
                                    And(
                                        Or(
                                            IsBlank(txtTitle_1.Value),
                                            StartsWith(
                                                Title,
                                                txtTitle_1.Value
                                            )
                                        ),
                                        Or(
                                            IsBlank(txtID.Value),
                                            ID = Value(txtID.Value)
                                        )
                                    ),
                                    Or(
                                        IsEmpty(drpStatus_1.SelectedItems),
                                        Status.Value = "Awaiting Approval" And CountRows(
                                            Filter(
                                                drpStatus_1.SelectedItems,
                                                Value = "Awaiting Approval"
                                            )
                                        ) > 0,
                                        IsEmpty(drpStatus_1.SelectedItems),
                                        Status.Value = "Approved" And CountRows(
                                            Filter(
                                                drpStatus_1.SelectedItems,
                                                Value = "Approved"
                                            )
                                        ) > 0,
                                        Status.Value = "In Progress" And CountRows(
                                            Filter(
                                                drpStatus_1.SelectedItems,
                                                Value = "In Progress"
                                            )
                                        ) > 0,
                                        Status.Value = "Ordered" And CountRows(
                                            Filter(
                                                drpStatus_1.SelectedItems,
                                                Value = "Ordered"
                                            )
                                        ) > 0,
                                        Status.Value = "Completed" And CountRows(
                                            Filter(
                                                drpStatus_1.SelectedItems,
                                                Value = "Completed"
                                            )
                                        ) > 0,
                                        Status.Value = "Rejected - Procurement" And CountRows(
                                            Filter(
                                                drpStatus_1.SelectedItems,
                                                Value = "Rejected - Procurement"
                                            )
                                        ) > 0,
                                        Status.Value = "Rejected - Approver" And CountRows(
                                            Filter(
                                                drpStatus_1.SelectedItems,
                                                Value = "Rejected - Approver"
                                            )
                                        ) > 0,
                                        Status.Value = "Cancelled" And CountRows(
                                            Filter(
                                                drpStatus_1.SelectedItems,
                                                Value = "Cancelled"
                                            )
                                        ) > 0
                                    ),
                                    Or(
                                        tglassignto.Checked = false,
                                        Assignto.Email = User().Email
                                    )
                                )
                              OnSelect: =
                              ReflowBehavior: ='PowerAppsOneGrid.ReflowBehavior'.Reflow
                            Children:
                              - Title:
                                  Control: TableDataField@1.5.0
                                  Variant: textualColumn
                                  IsLocked: true
                                  Properties:
                                    FieldDisplayName: ="Title"
                                    FieldName: ="Title"
                                    FieldType: ="s"
                                    HeaderText: =If(!IsBlank(txtTitle_1.Value),"Purchase Item","⚡ Purchase Item")
                                    Order: =3
                                    Width: =dynamicTableColWidth
                              - Status:
                                  Control: TableDataField@1.5.0
                                  Variant: textualColumn
                                  IsLocked: true
                                  Properties:
                                    FieldDisplayName: ="Status"
                                    FieldName: ="Status"
                                    FieldType: ="E"
                                    HeaderText: =If(drpStatus_1.Selected.Value = Blank(),"Status","⚡ Status")
                                    Order: =4
                                    Width: =dynamicTableColWidth
                              - Assignto:
                                  Control: TableDataField@1.5.0
                                  Variant: textualColumn
                                  IsLocked: true
                                  Properties:
                                    FieldDisplayName: ="Assignto"
                                    FieldName: ="Assignto"
                                    FieldType: ="E"
                                    HeaderText: |+
                                      ="Assign to"
                                    Order: =6
                              - Created By:
                                  Control: TableDataField@1.5.0
                                  Variant: textualColumn
                                  IsLocked: true
                                  Properties:
                                    FieldDisplayName: ="Created By"
                                    FieldName: ="Author"
                                    FieldType: ="E"
                                    Order: =6
                              - ID:
                                  Control: TableDataField@1.5.0
                                  Variant: textualColumn
                                  IsLocked: true
                                  Properties:
                                    FieldDisplayName: ="ID"
                                    FieldName: ="ID"
                                    FieldType: ="n"
                                    HeaderText: ="Request ID"
                                    Order: =1
                                    Width: =20
                              - Urgency:
                                  Control: TableDataField@1.5.0
                                  Variant: textualColumn
                                  IsLocked: true
                                  Properties:
                                    FieldDisplayName: ="Urgency"
                                    FieldName: ="Urgency"
                                    FieldType: ="b"
                                    Order: =5
