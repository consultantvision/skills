Screens:
  SupplierFeedBack:
    Children:
      - ScreenContainer3:
          Control: GroupContainer@1.3.0
          Variant: AutoLayout
          Properties:
            Fill: =RGBA(245, 245, 245, 1)
            Height: =Parent.Height
            LayoutAlignItems: =LayoutAlignItems.Stretch
            LayoutDirection: =LayoutDirection.Vertical
            LayoutGap: =16
            PaddingBottom: =16
            PaddingLeft: =16
            PaddingRight: =16
            PaddingTop: =16
            Width: =Parent.Width
          Children:
            - HeaderContainer3:
                Control: GroupContainer@1.3.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(255, 255, 255, 1)
                  FillPortions: =0
                  Height: =75
                  LayoutDirection: =LayoutDirection.Horizontal
                Children:
                  - Header3:
                      Control: Header@0.0.44
                      Properties:
                        IsProfilePictureVisible: =false
                        Logo: =events
                        OnSelectLogo: =Navigate(HomeScreen)
                        Title: ="Supplier Feedback Admin "
            - BottomContainer1:
                Control: GroupContainer@1.3.0
                Variant: AutoLayout
                Properties:
                  Fill: =RGBA(245, 245, 245, 1)
                  FillPortions: =0
                  Height: =LeftNav_1.Height
                  LayoutAlignItems: =LayoutAlignItems.Stretch
                  LayoutDirection: =LayoutDirection.Horizontal
                  LayoutGap: =16
                  LayoutWrap: =true
                  PaddingBottom: =2
                  PaddingLeft: =2
                  PaddingRight: =2
                  PaddingTop: =2
                Children:
                  - SidebarContainer2:
                      Control: GroupContainer@1.3.0
                      Variant: AutoLayout
                      Properties:
                        DropShadow: =DropShadow.None
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =0
                        Height: =LeftNav_1.Height
                        LayoutDirection: =LayoutDirection.Vertical
                        LayoutMinHeight: =0
                        LayoutMinWidth: =100
                        RadiusBottomLeft: =0
                        RadiusBottomRight: =0
                        RadiusTopLeft: =0
                        RadiusTopRight: =0
                        Width: =LeftNav_1.Width
                      Children:
                        - LeftNav_1:
                            Control: CanvasComponent
                            ComponentName: LeftNav
                            Properties:
                              Height: =App.DesignHeight - 125
                              Width: =If(varMenuOpen,200,80)
                  - MainContainer3:
                      Control: GroupContainer@1.3.0
                      Variant: AutoLayout
                      Properties:
                        Fill: =RGBA(255, 255, 255, 1)
                        FillPortions: =7
                        LayoutDirection: =LayoutDirection.Vertical
                      Children:
                        - Gallery2_1:
                            Control: Gallery@2.15.0
                            Variant: Vertical
                            Properties:
                              AccessibleLabel: ="Items gallery"
                              Items: =hsa_SupplierfeedbackList_1
                              ShowNavigation: =true
                              ShowScrollbar: =false
                              TabIndex: =0
                              TemplatePadding: =20
                              TemplateSize: =265
                              Transition: =Transition.Pop
                              WrapCount: =If(SupplierFeedBack.Size = ScreenSize.ExtraLarge , 3, SupplierFeedBack.Size = ScreenSize.Large, 2, 1)
                            Children:
                              - GalleryContainer2_1:
                                  Control: GroupContainer@1.3.0
                                  Variant: AutoLayout
                                  Properties:
                                    Fill: =RGBA(255, 255, 255, 1)
                                    Height: =Parent.TemplateHeight
                                    LayoutAlignItems: =LayoutAlignItems.Center
                                    LayoutDirection: =LayoutDirection.Vertical
                                    LayoutJustifyContent: =LayoutJustifyContent.Center
                                    LayoutOverflowY: =LayoutOverflow.Scroll
                                    Width: =Parent.TemplateWidth
                                  Children:
                                    - TitleContainer2_1:
                                        Control: GroupContainer@1.3.0
                                        Variant: AutoLayout
                                        Properties:
                                          AlignInContainer: =AlignInContainer.Center
                                          LayoutDirection: =LayoutDirection.Vertical
                                          LayoutGap: =8
                                          LayoutMinWidth: =GalleryContainer2_1.Width
                                          PaddingLeft: =20
                                          PaddingRight: =20
                                          PaddingTop: =12
                                          Width: =Parent.Width
                                        Children:
                                          - TitleText2_1:
                                              Control: Text@0.0.51
                                              Properties:
                                                Align: ='TextCanvas.Align'.Center
                                                Fill: =RGBA(214, 221, 224, 1)
                                                Height: =30
                                                LayoutMinWidth: =Parent.Width
                                                Size: =16
                                                Text: =ThisItem.Title
                                                VerticalAlign: =VerticalAlign.Top
                                                Weight: ='TextCanvas.Weight'.Bold
                                                Width: =Parent.Width - TitleContainer2_1.PaddingLeft
                                          - DescriptionText2_1:
                                              Control: Text@0.0.51
                                              Properties:
                                                Align: ='TextCanvas.Align'.Center
                                                Height: =25
                                                LayoutMinWidth: =Parent.Width
                                                Size: =16
                                                Text: =ThisItem.Status.Value
                                                VerticalAlign: =VerticalAlign.Top
                                                Weight: ='TextCanvas.Weight'.Semibold
                                                Width: =Parent.Width - TitleContainer2_1.PaddingLeft
                                          - TextCanvas2_3:
                                              Control: Text@0.0.51
                                              Properties:
                                                Align: ='TextCanvas.Align'.Center
                                                AlignInContainer: =AlignInContainer.Center
                                                Text: |-
                                                  =Concatenate("📅 ", ThisItem.Created)
                                                VerticalAlign: =VerticalAlign.Middle
                                                Width: =200
                                          - Container1_2:
                                              Control: GroupContainer@1.3.0
                                              Variant: AutoLayout
                                              Properties:
                                                DropShadow: =DropShadow.None
                                                LayoutAlignItems: =LayoutAlignItems.Center
                                                LayoutDirection: =LayoutDirection.Horizontal
                                                LayoutJustifyContent: =LayoutJustifyContent.Center
                                                LayoutMinHeight: |+
                                                  =40
                                              Children:
                                                - TextCanvas3_1:
                                                    Control: Text@0.0.51
                                                    Properties:
                                                      AlignInContainer: =AlignInContainer.Stretch
                                                      Height: =40
                                                      Text: |-
                                                        ="request ID: " & ThisItem.ID
                                                      VerticalAlign: =VerticalAlign.Middle
                                                - BadgeCanvas2_1:
                                                    Control: Badge@0.0.24
                                                    Properties:
                                                      AlignInContainer: =AlignInContainer.Stretch
                                                      Content: =ThisItem.FeedbackType.Value
                                                      FillPortions: =1
                                                      LayoutMinWidth: =30
                                                      Width: =180
                                    - ButtonContainer2_1:
                                        Control: GroupContainer@1.3.0
                                        Variant: AutoLayout
                                        Properties:
                                          AlignInContainer: =AlignInContainer.SetByContainer
                                          FillPortions: =0
                                          Height: =50
                                          LayoutDirection: =LayoutDirection.Horizontal
                                          PaddingBottom: =12
                                          PaddingLeft: =20
                                          PaddingRight: =20
                                          PaddingTop: =8
                                          Width: =Parent.Width
                                        Children:
                                          - Button2_1:
                                              Control: Button@0.0.45
                                              Properties:
                                                AccessibleLabel: ="Featured item button"
                                                Appearance: ='ButtonCanvas.Appearance'.Secondary
                                                OnSelect: =Set(varMaintItem,ThisItem);EditForm(SuppFeedForm);Navigate(EditSupplierfeed)
                                                Text: ="Details"
                                                Width: =110
                                    - Header6_1:
                                        Control: Header@0.0.44
                                        Properties:
                                          Height: |+
                                            =50
                                          IsLogoVisible: =false
                                          Style: ='Header.Style'.Primary
                                          Title: =ThisItem.'Created By'.DisplayName
                                          TitleFontSize: =16
                                          UserEmail: =
                                          UserImage: =ThisItem.'Created By'.Picture
                                          UserName: =
